services:
  api:
    build: .
    ports:
      - "8000:8000"
    # serves the prediction API at http://localhost:8000/docs

  dashboard:
    build: .
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    # serves the Streamlit dashboard at http://localhost:8501
