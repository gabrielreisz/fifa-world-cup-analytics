name: Data freshness

# Weekly check that the upstream dataset still loads and the pipeline holds.
on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Re-download dataset
        run: worldcup build-data --force
      - name: Run integration tests against fresh data
        run: pytest -m integration
